<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры разума - Мини-игры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding-bottom: 20px;
        }

        .screen.active {
            display: block;
        }

        .header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            min-height: 60px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .back-btn.hidden {
            display: none;
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            flex: 1;
            text-align: center;
        }

        .header-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .coin-display {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
        }

        /* Main Menu Screen */
        .main-menu {
            background: linear-gradient(180deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }

        .menu-section {
            margin-bottom: 15px;
        }

        .menu-tab {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid transparent;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-tab:active {
            transform: scale(0.98);
        }

        .menu-tab .icon {
            font-size: 40px;
            margin-right: 15px;
        }

        .menu-tab .label {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            flex: 1;
        }

        /* Colorful gradient backgrounds for tabs */
        .menu-tab:nth-child(1) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .menu-tab:nth-child(1) .label {
            color: white;
        }

        .menu-tab:nth-child(2) {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .menu-tab:nth-child(2) .label {
            color: white;
        }

        .menu-tab:nth-child(3) {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .menu-tab:nth-child(3) .label {
            color: white;
        }

        .menu-tab:nth-child(4) {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .menu-tab:nth-child(4) .label {
            color: white;
        }

        .menu-tab:nth-child(5) {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .menu-tab:nth-child(5) .label {
            color: white;
        }

        .menu-tab:nth-child(6) {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
            color: white;
        }

        .menu-tab:nth-child(6) .label {
            color: white;
        }

        .games-section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin: 20px 0 15px 0;
            padding: 0 20px;
        }

        .game-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: 20px;
            margin-right: 20px;
        }

        .game-card:active {
            transform: scale(0.98);
        }

        .game-card .icon {
            font-size: 40px;
        }

        .game-card .info {
            flex: 1;
        }

        .game-card .name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .game-card .status {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        /* Game cards with gradients */
        .game-card:nth-child(1) { background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%); color: white; }
        .game-card:nth-child(1) .name, .game-card:nth-child(1) .status { color: white; }
        .game-card:nth-child(2) { background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%); color: white; }
        .game-card:nth-child(2) .name, .game-card:nth-child(2) .status { color: white; }
        .game-card:nth-child(3) { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .game-card:nth-child(4) { background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%); color: white; }
        .game-card:nth-child(4) .name, .game-card:nth-child(4) .status { color: white; }
        .game-card:nth-child(5) { background: linear-gradient(135deg, #a1c4fd 0%, #c2e59c 100%); }
        .game-card:nth-child(6) { background: linear-gradient(135deg, #f78ca0 0%, #f4a261 100%); color: white; }
        .game-card:nth-child(6) .name, .game-card:nth-child(6) .status { color: white; }

        /* Profile Screen */
        .profile-content {
            padding: 20px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 15px;
        }

        .profile-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .profile-id {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            font-family: monospace;
            word-break: break-all;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* Settings Screen */
        .settings-content {
            padding: 20px;
        }

        .setting-group {
            margin-bottom: 25px;
        }

        .setting-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .setting-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border: 1px solid #eee;
        }

        .toggle-switch {
            width: 50px;
            height: 28px;
            background: #ccc;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #667eea;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 24px;
        }

        .button-arrangement {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .arrangement-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .arrangement-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .arrangement-btn.selected {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Coming Soon Screen */
        .coming-soon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .coming-soon-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .coming-soon-text {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            white-space: pre-wrap;
        }

        /* Game Selection Screen */
        .game-selection {
            padding: 20px;
        }

        .game-modes {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .mode-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
        }

        .mode-card:active {
            transform: scale(0.98);
        }

        .mode-icon {
            font-size: 30px;
            margin-right: 10px;
        }

        .mode-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .mode-desc {
            font-size: 12px;
            color: #999;
        }

        /* Shop Screen */
        .shop-content {
            padding: 20px;
        }

        .shop-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .shop-tab {
            background: white;
            border: 2px solid #eee;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: bold;
        }

        .shop-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .shop-items {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .shop-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 2px solid #eee;
        }

        .item-icon {
            font-size: 40px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .item-desc {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .item-price {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            color: #667eea;
        }

        .buy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .buy-btn:active {
            transform: scale(0.95);
        }

        /* Ratings Screen */
        .ratings-content {
            padding: 20px;
        }

        .rating-type-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .rating-tab {
            background: white;
            border: 2px solid #eee;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: bold;
        }

        .rating-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .rating-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .rating-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid #667eea;
        }

        .rating-position {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            min-width: 40px;
            text-align: center;
        }

        .rating-position.gold {
            color: #ffd700;
        }

        .rating-position.silver {
            color: #c0c0c0;
        }

        .rating-position.bronze {
            color: #cd7f32;
        }

        .rating-info {
            flex: 1;
        }

        .rating-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .rating-score {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .rating-coins {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            color: #667eea;
            flex-shrink: 0;
        }

        /* Game Play Screen */
        .game-play-screen {
            padding: 20px;
        }

        .game-board {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-controls {
            display: flex;
            gap: 10px;
        }

        .game-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .game-btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .game-btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .game-btn:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .modal-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .modal-text {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn-secondary {
            background: #eee;
            color: #333;
        }

        .modal-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <button class="back-btn hidden" id="backBtn">←</button>
                <div class="header-title" id="headerTitle">Игры разума</div>
                <div class="header-info">
                    <div class="coin-display">
                        <span>💰</span>
                        <span id="ratingCoins">0</span>
                    </div>
                    <div class="coin-display">
                        <span>🛍️</span>
                        <span id="shopCoins">0</span>
                    </div>
                </div>
            </div>

            <!-- Main Menu Screen -->
            <div id="mainMenuScreen" class="screen active">
                <div class="main-menu">
                    <div class="menu-section">
                        <div class="menu-tab" onclick="app.showScreen('profileScreen')">
                            <div class="icon">👤</div>
                            <div class="label">Профиль</div>
                        </div>
                        <div class="menu-tab" onclick="app.showScreen('ratingsScreen')">
                            <div class="icon">🏆</div>
                            <div class="label">Рейтинги</div>
                        </div>
                        <div class="menu-tab" onclick="app.showScreen('settingsScreen')">
                            <div class="icon">⚙️</div>
                            <div class="label">Настройки</div>
                        </div>
                        <div class="menu-tab" onclick="app.showComingSoon('ПВП')">
                            <div class="icon">⚔️</div>
                            <div class="label">ПВП</div>
                        </div>
                        <div class="menu-tab" onclick="app.showComingSoon('Турниры')">
                            <div class="icon">🎪</div>
                            <div class="label">Турниры</div>
                        </div>
                    </div>

                    <div class="menu-tab" onclick="app.showScreen('shopScreen')" style="margin: 0 20px 20px 20px;">
                        <div class="icon">🛍️</div>
                        <div class="label">Магазин</div>
                    </div>

                    <div class="games-section-title">Мини-игры</div>
                    <div id="gamesContainer" class="menu-section" style="margin: 0;"></div>
                </div>
            </div>

            <!-- Profile Screen -->
            <div id="profileScreen" class="screen">
                <div class="profile-content">
                    <div class="profile-header">
                        <div class="profile-avatar">🧠</div>
                        <div class="profile-name" id="profileName">Игрок</div>
                        <div class="profile-id" id="profileId">0bec8877-088...</div>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-box">
                            <div class="stat-value" id="profileRating">0</div>
                            <div class="stat-label">Общий рейтинг</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="profileCoins">0</div>
                            <div class="stat-label">Коины</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="profileWins">0</div>
                            <div class="stat-label">Побед</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="profileLosses">0</div>
                            <div class="stat-label">Поражений</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Ratings Screen -->
            <div id="ratingsScreen" class="screen">
                <div class="ratings-content">
                    <div class="rating-type-tabs" id="ratingTypeTabsContainer"></div>
                    <div class="rating-list" id="ratingsListContainer"></div>
                </div>
            </div>

            <!-- Settings Screen -->
            <div id="settingsScreen" class="screen">
                <div class="settings-content">
                    <div class="setting-group">
                        <div class="setting-title">Звук</div>
                        <div class="setting-item">
                            <span>Включить звук</span>
                            <div class="toggle-switch active" onclick="app.toggleSound(this)"></div>
                        </div>
                    </div>

                    <div class="setting-group">
                        <div class="setting-title">Тема</div>
                        <div class="setting-item">
                            <span>Светлая тема</span>
                            <div class="toggle-switch" onclick="app.toggleTheme(this)"></div>
                        </div>
                    </div>

                    <div class="setting-group">
                        <div class="setting-title">Расположение кнопок мини-игр</div>
                        <div class="button-arrangement">
                            <div class="arrangement-grid" id="arrangementGrid"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Shop Screen -->
            <div id="shopScreen" class="screen">
                <div class="shop-content">
                    <div class="shop-tabs" id="shopTabsContainer"></div>
                    <div class="shop-items" id="shopItemsContainer"></div>
                </div>
            </div>

            <!-- Coming Soon Screen -->
            <div id="comingSoonScreen" class="screen">
                <div class="coming-soon">
                    <div class="coming-soon-icon">⏳</div>
                    <div class="coming-soon-text" id="comingSoonText">Скоро...</div>
                </div>
            </div>

            <!-- Game Selection Screen -->
            <div id="gameSelectionScreen" class="screen">
                <div class="game-selection">
                    <div class="game-modes" id="gameModesContainer"></div>
                </div>
            </div>

            <!-- Game Play Screen -->
            <div id="gamePlayScreen" class="screen">
                <div class="game-play-screen">
                    <div class="game-board" id="gameBoard"></div>
                    <div class="game-controls">
                        <button class="game-btn game-btn-primary" onclick="app.newGame()">Новая игра</button>
                        <button class="game-btn game-btn-secondary" onclick="app.backToSelection()">Назад</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <div class="modal-title" id="modalTitle">Заголовок</div>
            <div class="modal-text" id="modalText">Описание</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-primary" onclick="app.closeModal()">ОК</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            state: {
                currentPlayer: null,
                ratingCoins: 0,
                shopCoins: 0,
                soundEnabled: true,
                lightTheme: false,
                gameButtonOrder: ['Судоку', 'Крестики-нолики', 'Шахматы', 'Шашки', 'Сапёр', 'Морской бой'],
                ratings: {},
                currentScreen: 'mainMenuScreen',
                currentGame: null,
                gameMode: null
            },

            games: [
                { name: 'Судоку', icon: '🔢', id: 'sudoku' },
                { name: 'Крестики-нолики', icon: '⭕', id: 'tictactoe' },
                { name: 'Шахматы', icon: '♟️', id: 'chess' },
                { name: 'Шашки', icon: '⚫', id: 'checkers' },
                { name: 'Сапёр', icon: '💣', id: 'minesweeper' },
                { name: 'Морской бой', icon: '🚢', id: 'battleship' }
            ],

            shop: {
                skins: [
                    { name: 'Красная бомба', icon: '🔴', price: 50, category: 'skins' },
                    { name: 'Синяя бомба', icon: '🔵', price: 50, category: 'skins' },
                    { name: 'Жёлтая бомба', icon: '🟡', price: 50, category: 'skins' },
                    { name: 'Зелёная бомба', icon: '🟢', price: 50, category: 'skins' }
                ],
                rewards: [
                    { name: '1 место', icon: '🥇', price: 'Автоматический', category: 'rewards', bonus: 151 },
                    { name: '2 место', icon: '🥈', price: 'Автоматический', category: 'rewards', bonus: 100 },
                    { name: '3 место', icon: '🥉', price: 'Автоматический', category: 'rewards', bonus: 80 }
                ],
                fans: [
                    { name: 'Один фан', icon: '👤', price: 100, category: 'fans' },
                    { name: 'Пять фанов', icon: '👥', price: 400, category: 'fans' },
                    { name: 'Десять фанов', icon: '👫', price: 750, category: 'fans' }
                ]
            },

            gameState: {
                tictactoe: null,
                minesweeper: null,
                battleship: null
            },

            init() {
                this.loadGame();
                this.generatePlayerId();
                this.initializeRatings();
                this.randomizeGameOrder();
                this.renderMainMenu();
                this.attachEventListeners();
                this.updateCoinsDisplay();
            },

            randomizeGameOrder() {
                const gameNames = ['Судоку', 'Крестики-нолики', 'Шахматы', 'Шашки', 'Сапёр', 'Морской бой'];
                for (let i = gameNames.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [gameNames[i], gameNames[j]] = [gameNames[j], gameNames[i]];
                }
                this.state.gameButtonOrder = gameNames;
                this.saveGame();
            },

            generatePlayerId() {
                if (!this.state.currentPlayer) {
                    this.state.currentPlayer = {
                        id: this.generateUUID(),
                        name: 'Игрок',
                        rating: 0,
                        wins: 0,
                        losses: 0
                    };
                    this.saveGame();
                }
            },

            generateUUID() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            },

            initializeRatings() {
                this.games.forEach(game => {
                    if (!this.state.ratings[game.id]) {
                        this.state.ratings[game.id] = [
                            { name: 'Вы', score: 0, position: 1, coins: 0 },
                            { name: 'Робот', score: 100, position: 2, coins: 0 }
                        ];
                    }
                });
                if (!this.state.ratings.overall) {
                    this.state.ratings.overall = [
                        { name: 'Вы', score: 0, position: 1, coins: 0 },
                        { name: 'Робот', score: 100, position: 2, coins: 0 }
                    ];
                }
            },

            attachEventListeners() {
                const backBtn = document.getElementById('backBtn');
                if (backBtn) {
                    backBtn.addEventListener('click', () => this.goBack());
                }
            },

            renderMainMenu() {
                const gamesContainer = document.getElementById('gamesContainer');
                if (!gamesContainer) return;
                
                gamesContainer.innerHTML = '';
                
                this.state.gameButtonOrder.forEach((gameName) => {
                    const game = this.games.find(g => g.name === gameName);
                    if (game) {
                        const gameCard = document.createElement('div');
                        gameCard.className = 'game-card';
                        gameCard.onclick = () => this.selectGame(game.id);
                        gameCard.innerHTML = `
                            <div class="icon">${game.icon}</div>
                            <div class="info">
                                <div class="name">${game.name}</div>
                            </div>
                        `;
                        gamesContainer.appendChild(gameCard);
                    }
                });
            },

            renderShopTabs() {
                const container = document.getElementById('shopTabsContainer');
                if (!container) return;
                
                container.innerHTML = '';
                
                const tabs = ['Скины', 'Призы', 'Фаны'];
                tabs.forEach((tab, index) => {
                    const tabEl = document.createElement('div');
                    tabEl.className = `shop-tab ${index === 0 ? 'active' : ''}`;
                    tabEl.textContent = tab;
                    tabEl.onclick = () => this.switchShopTab(index, tab);
                    container.appendChild(tabEl);
                });
            },

            renderShopItems(category = 'skins') {
                const container = document.getElementById('shopItemsContainer');
                if (!container) return;

                container.innerHTML = '';

                let items = [];
                if (category === 'skins') items = this.shop.skins;
                else if (category === 'rewards') items = this.shop.rewards;
                else if (category === 'fans') items = this.shop.fans;

                items.forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'shop-item';
                    const price = typeof item.price === 'number' ? item.price : item.price;
                    itemEl.innerHTML = `
                        <div class="item-icon">${item.icon}</div>
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-desc">${category === 'rewards' ? 'Ограниченное предложение' : 'Улучшение'}</div>
                        </div>
                        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">
                            <div class="item-price">${typeof item.price === 'number' ? '💰' : '⭐'} ${price}</div>
                            <button class="buy-btn" onclick="app.buyItem('${item.name.replace(/'/g, "\\'")}', ${typeof item.price === 'number' ? item.price : 0})">Купить</button>
                        </div>
                    `;
                    container.appendChild(itemEl);
                });
            },

            renderRatings(ratingType = 'overall') {
                const tabs = document.getElementById('ratingTypeTabsContainer');
                if (!tabs) return;

                if (tabs.children.length === 0) {
                    const allTabs = ['Общий', ...this.games.map(g => g.name)];
                    tabs.innerHTML = '';
                    allTabs.forEach((tabName, index) => {
                        const tabEl = document.createElement('div');
                        tabEl.className = `rating-tab ${index === 0 ? 'active' : ''}`;
                        tabEl.textContent = tabName;
                        const gameId = index === 0 ? 'overall' : this.games[index - 1].id;
                        tabEl.onclick = () => this.switchRatingTab(gameId, tabEl);
                        tabs.appendChild(tabEl);
                    });
                }

                const container = document.getElementById('ratingsListContainer');
                if (!container) return;

                container.innerHTML = '';
                const ratings = this.state.ratings[ratingType] || [];
                
                const sorted = [...ratings].sort((a, b) => b.score - a.score);
                sorted.forEach((player, index) => {
                    const position = index + 1;
                    const medal = position === 1 ? '🥇' : position === 2 ? '🥈' : position === 3 ? '🥉' : '';
                    const itemEl = document.createElement('div');
                    itemEl.className = 'rating-item';
                    const positionClass = position === 1 ? 'gold' : position === 2 ? 'silver' : position === 3 ? 'bronze' : '';
                    itemEl.innerHTML = `
                        <div class="rating-position ${positionClass}">${medal || position}</div>
                        <div class="rating-info">
                            <div class="rating-name">${player.name}</div>
                            <div class="rating-score">Очки: ${player.score}</div>
                        </div>
                        <div class="rating-coins">💰 ${player.coins || 0}</div>
                    `;
                    container.appendChild(itemEl);
                });
            },

            switchRatingTab(gameId, tabElement) {
                document.querySelectorAll('.rating-tab').forEach(t => t.classList.remove('active'));
                tabElement.classList.add('active');
                this.renderRatings(gameId);
            },

            switchShopTab(index, category) {
                document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
                const tabs = document.querySelectorAll('.shop-tab');
                if (tabs[index]) {
                    tabs[index].classList.add('active');
                }
                
                const catMap = { 'Скины': 'skins', 'Призы': 'rewards', 'Фаны': 'fans' };
                this.renderShopItems(catMap[category]);
            },

            selectGame(gameId) {
                this.state.currentGame = gameId;
                this.showGameSelection();
            },

            showGameSelection() {
                const container = document.getElementById('gameModesContainer');
                if (!container) return;

                container.innerHTML = `
                    <div class="mode-card" onclick="app.startGame('self')">
                        <div style="display: flex; align-items: center;">
                            <div class="mode-icon">🎮</div>
                            <div>
                                <div class="mode-name">Игра с собой</div>
                                <div class="mode-desc">Играйте против самих себя</div>
                            </div>
                        </div>
                    </div>
                    <div class="mode-card" onclick="app.showDifficultySelection()">
                        <div style="display: flex; align-items: center;">
                            <div class="mode-icon">🤖</div>
                            <div>
                                <div class="mode-name">Против робота</div>
                                <div class="mode-desc">Выберите уровень сложности</div>
                            </div>
                        </div>
                    </div>
                `;
                this.showScreen('gameSelectionScreen');
            },

            showDifficultySelection() {
                const container = document.getElementById('gameModesContainer');
                if (!container) return;

                container.innerHTML = `
                    <div class="mode-card" onclick="app.startGame('easy')">
                        <div style="display: flex; align-items: center;">
                            <div class="mode-icon">😊</div>
                            <div>
                                <div class="mode-name">Легко</div>
                                <div class="mode-desc">Для новичков</div>
                            </div>
                        </div>
                    </div>
                    <div class="mode-card" onclick="app.startGame('medium')">
                        <div style="display: flex; align-items: center;">
                            <div class="mode-icon">🤔</div>
                            <div>
                                <div class="mode-name">Средне</div>
                                <div class="mode-desc">Для опытных</div>
                            </div>
                        </div>
                    </div>
                    <div class="mode-card" onclick="app.startGame('hard')">
                        <div style="display: flex; align-items: center;">
                            <div class="mode-icon">😈</div>
                            <div>
                                <div class="mode-name">Сложно</div>
                                <div class="mode-desc">Для профессионалов</div>
                            </div>
                        </div>
                    </div>
                `;
            },

            startGame(mode) {
                this.state.gameMode = mode;
                this.showScreen('gamePlayScreen');
                this.initializeGame();
            },

            initializeGame() {
                const board = document.getElementById('gameBoard');
                if (!board) return;

                switch(this.state.currentGame) {
                    case 'sudoku':
                        this.initSudoku(board);
                        break;
                    case 'tictactoe':
                        this.initTicTacToe(board);
                        break;
                    case 'chess':
                        this.initChess(board);
                        break;
                    case 'checkers':
                        this.initCheckers(board);
                        break;
                    case 'minesweeper':
                        this.initMinesweeper(board);
                        break;
                    case 'battleship':
                        this.initBattleship(board);
                        break;
                }
            },

            initSudoku(board) {
                board.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(9, 1fr); gap: 2px; width: 100%;">
                        ${Array(81).fill(0).map((_, i) => `
                            <input type="number" min="1" max="9" 
                                style="width: 100%; aspect-ratio: 1 / 1; text-align: center; 
                                border: 1px solid #ccc; border-radius: 5px; font-size: 14px;">
                        `).join('')}
                    </div>
                `;
            },

            initTicTacToe(board) {
                board.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%;">
                        ${Array(9).fill(0).map((_, i) => `
                            <button class="game-btn game-btn-primary" 
                                style="height: 80px; font-size: 30px; padding: 0;"
                                onclick="app.tttClick(${i})">-</button>
                        `).join('')}
                    </div>
                `;
                this.gameState.tictactoe = { board: Array(9).fill(null), playerX: true };
            },

            tttClick(index) {
                if (this.gameState.tictactoe && !this.gameState.tictactoe.board[index]) {
                    this.gameState.tictactoe.board[index] = this.gameState.tictactoe.playerX ? 'X' : 'O';
                    const buttons = document.querySelectorAll('#gameBoard .game-btn-primary');
                    if (buttons[index]) {
                        buttons[index].textContent = this.gameState.tictactoe.board[index];
                    }
                    this.gameState.tictactoe.playerX = !this.gameState.tictactoe.playerX;
                }
            },

            initChess(board) {
                board.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(8, 1fr); gap: 1px; background: #333; width: 100%;">
                        ${Array(64).fill(0).map((_, i) => {
                            const row = Math.floor(i / 8);
                            const col = i % 8;
                            const isLight = (row + col) % 2 === 0;
                            return `<div style="width: 100%; aspect-ratio: 1 / 1; background: ${isLight ? '#f0d9b5' : '#b58863'};"></div>`;
                        }).join('')}
                    </div>
                `;
            },

            initCheckers(board) {
                board.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(8, 1fr); gap: 1px; width: 100%;">
                        ${Array(64).fill(0).map((_, i) => {
                            const row = Math.floor(i / 8);
                            const col = i % 8;
                            const isLight = (row + col) % 2 === 0;
                            const hasPiece = row < 3 || row > 4;
                            return `<div style="width: 100%; aspect-ratio: 1 / 1; background: ${isLight ? '#f0d9b5' : '#b58863'}; display: flex; align-items: center; justify-content: center;">${hasPiece ? '⚫' : ''}</div>`;
                        }).join('')}
                    </div>
                `;
            },

            initMinesweeper(board) {
                board.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; width: 100%;">
                        ${Array(64).fill(0).map((_, i) => `
                            <button class="game-btn game-btn-secondary" 
                                style="height: auto; aspect-ratio: 1 / 1; padding: 0; width: 100%;"
                                onclick="app.mineClick(${i})">?</button>
                        `).join('')}
                    </div>
                `;
                this.gameState.minesweeper = { 
                    board: Array(64).fill(0),
                    revealed: Array(64).fill(false)
                };
                for (let i = 0; i < 10; i++) {
                    let pos = Math.floor(Math.random() * 64);
                    this.gameState.minesweeper.board[pos] = 'M';
                }
            },

            mineClick(index) {
                if (!this.gameState.minesweeper) return;

                this.gameState.minesweeper.revealed[index] = true;
                const btn = document.querySelectorAll('#gameBoard .game-btn-secondary')[index];
                if (btn) {
                    if (this.gameState.minesweeper.board[index] === 'M') {
                        btn.textContent = '💣';
                        btn.style.background = '#ff6b6b';
                        this.playerLost(15);
                        this.showModal('💥', 'Игра окончена!', 'Вы нашли мину!');
                    } else {
                        btn.textContent = '✓';
                        btn.disabled = true;
                    }
                }
            },

            initBattleship(board) {
                board.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; width: 100%;">
                        ${Array(100).fill(0).map((_, i) => `
                            <button class="game-btn game-btn-secondary" 
                                style="height: auto; aspect-ratio: 1 / 1; padding: 0; font-size: 12px; width: 100%;"
                                onclick="app.shipClick(${i})">🌊</button>
                        `).join('')}
                    </div>
                `;
                this.gameState.battleship = { 
                    board: Array(100).fill(0),
                    revealed: Array(100).fill(false)
                };
            },

            shipClick(index) {
                if (!this.gameState.battleship) return;

                this.gameState.battleship.revealed[index] = true;
                const btn = document.querySelectorAll('#gameBoard .game-btn-secondary')[index];
                if (btn) {
                    const hit = Math.random() > 0.7;
                    if (hit) {
                        btn.textContent = '💥';
                        btn.style.background = '#ff6b6b';
                        this.playerWon(60);
                    } else {
                        btn.textContent = '✓';
                        btn.style.background = '#ccc';
                    }
                }
            },

            playerWon(coins) {
                this.state.currentPlayer.wins++;
                this.addRatingCoins(coins);
                this.updateProfileDisplay();
                this.saveGame();
            },

            playerLost(penalty) {
                this.state.currentPlayer.losses++;
                const currentCoins = this.state.ratingCoins;
                this.state.ratingCoins = Math.max(0, currentCoins - penalty);
                this.updateCoinsDisplay();
                this.updateProfileDisplay();
                this.saveGame();
            },

            addRatingCoins(amount) {
                this.state.ratingCoins += amount;
                const shopCoinsGain = Math.floor(amount / 2);
                this.state.shopCoins += shopCoinsGain;
                this.updateCoinsDisplay();
                this.saveGame();
            },

            newGame() {
                this.initializeGame();
            },

            backToSelection() {
                this.showScreen('gameSelectionScreen');
            },

            showScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                const screen = document.getElementById(screenId);
                if (screen) {
                    screen.classList.add('active');
                }
                this.state.currentScreen = screenId;

                const backBtn = document.getElementById('backBtn');
                const headerTitle = document.getElementById('headerTitle');

                if (!backBtn || !headerTitle) return;

                switch(screenId) {
                    case 'mainMenuScreen':
                        backBtn.classList.add('hidden');
                        headerTitle.textContent = 'Игры разума';
                        break;
                    case 'profileScreen':
                        backBtn.classList.remove('hidden');
                        headerTitle.textContent = 'Профиль';
                        this.updateProfileDisplay();
                        break;
                    case 'ratingsScreen':
                        backBtn.classList.remove('hidden');
                        headerTitle.textContent = 'Рейтинги';
                        this.renderRatings();
                        break;
                    case 'settingsScreen':
                        backBtn.classList.remove('hidden');
                        headerTitle.textContent = 'Настройки';
                        this.renderSettingsUI();
                        break;
                    case 'shopScreen':
                        backBtn.classList.remove('hidden');
                        headerTitle.textContent = 'Магазин';
                        this.renderShopTabs();
                        this.renderShopItems('skins');
                        break;
                    case 'gameSelectionScreen':
                        backBtn.classList.remove('hidden');
                        const gameName = this.games.find(g => g.id === this.state.currentGame)?.name || 'Игра';
                        headerTitle.textContent = gameName;
                        break;
                    case 'gamePlayScreen':
                        backBtn.classList.remove('hidden');
                        const playGameName = this.games.find(g => g.id === this.state.currentGame)?.name || 'Игра';
                        headerTitle.textContent = playGameName;
                        break;
                }
            },

            showComingSoon(featureName) {
                const textEl = document.getElementById('comingSoonText');
                if (textEl) {
                    textEl.textContent = featureName + '\n\nСкоро...';
                }
                this.showScreen('comingSoonScreen');
                const backBtn = document.getElementById('backBtn');
                if (backBtn) {
                    backBtn.classList.remove('hidden');
                }
            },

            goBack() {
                if (['comingSoonScreen', 'gamePlayScreen', 'gameSelectionScreen'].includes(this.state.currentScreen)) {
                    this.showScreen('mainMenuScreen');
                } else if (this.state.currentScreen !== 'mainMenuScreen') {
                    this.showScreen('mainMenuScreen');
                }
            },

            updateProfileDisplay() {
                if (!this.state.currentPlayer) return;

                const profileName = document.getElementById('profileName');
                const profileId = document.getElementById('profileId');
                const profileRating = document.getElementById('profileRating');
                const profileCoins = document.getElementById('profileCoins');
                const profileWins = document.getElementById('profileWins');
                const profileLosses = document.getElementById('profileLosses');

                if (profileName) profileName.textContent = this.state.currentPlayer.name;
                if (profileId) profileId.textContent = this.state.currentPlayer.id.substring(0, 20) + '...';
                if (profileRating) profileRating.textContent = this.state.currentPlayer.rating;
                if (profileCoins) profileCoins.textContent = this.state.ratingCoins;
                if (profileWins) profileWins.textContent = this.state.currentPlayer.wins;
                if (profileLosses) profileLosses.textContent = this.state.currentPlayer.losses;
            },

            renderSettingsUI() {
                const container = document.getElementById('arrangementGrid');
                if (!container) return;

                container.innerHTML = '';
                this.games.forEach((game) => {
                    const btn = document.createElement('button');
                    btn.className = 'arrangement-btn selected';
                    btn.textContent = game.name.substring(0, 3);
                    btn.onclick = () => this.selectGameOrder(btn, game.name);
                    container.appendChild(btn);
                });
            },

            selectGameOrder(element, gameName) {
                document.querySelectorAll('.arrangement-btn').forEach(b => b.classList.remove('selected'));
                element.classList.add('selected');
                this.saveGame();
            },

            toggleSound(element) {
                element.classList.toggle('active');
                this.state.soundEnabled = !this.state.soundEnabled;
                this.saveGame();
            },

            toggleTheme(element) {
                element.classList.toggle('active');
                this.state.lightTheme = !this.state.lightTheme;
                this.saveGame();
            },

            buyItem(itemName, price) {
                if (this.state.shopCoins >= price) {
                    this.state.shopCoins -= price;
                    this.showModal('🎉', 'Покупка успешна!', `Вы купили ${itemName}`);
                    this.updateCoinsDisplay();
                    this.saveGame();
                } else if (price > 0) {
                    this.showModal('❌', 'Недостаточно коинов', `Нужно еще ${price - this.state.shopCoins} коинов`);
                } else {
                    this.showModal('ℹ️', 'Информация', 'Награды выдаются автоматически за места в рейтинге');
                }
            },

            updateCoinsDisplay() {
                const ratingCoinsEl = document.getElementById('ratingCoins');
                const shopCoinsEl = document.getElementById('shopCoins');
                
                if (ratingCoinsEl) ratingCoinsEl.textContent = this.state.ratingCoins;
                if (shopCoinsEl) shopCoinsEl.textContent = this.state.shopCoins;
            },

            showModal(icon, title, text) {
                const modalIcon = document.getElementById('modalIcon');
                const modalTitle = document.getElementById('modalTitle');
                const modalText = document.getElementById('modalText');
                const modal = document.getElementById('modal');

                if (modalIcon) modalIcon.textContent = icon;
                if (modalTitle) modalTitle.textContent = title;
                if (modalText) modalText.textContent = text;
                if (modal) modal.classList.add('active');
            },

            closeModal() {
                const modal = document.getElementById('modal');
                if (modal) modal.classList.remove('active');
            },

            saveGame() {
                localStorage.setItem('gameState', JSON.stringify(this.state));
            },

            loadGame() {
                const saved = localStorage.getItem('gameState');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        this.state = { ...this.state, ...parsed };
                    } catch (e) {
                        console.error('Ошибка загрузки игры:', e);
                    }
                }
            }
        };

        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
